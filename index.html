<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Calculadora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="calculadora">
    <input type="text" id="display" disabled>

    <div class="botoes">
      <button class="op" onclick="limpar()">C</button>
      <button class="op" onclick="apagar()">←</button>
      <button class="op" onclick="add('/')">÷</button>
      <button class="op" onclick="add('*')">×</button>

      <button onclick="add('7')">7</button>
      <button onclick="add('8')">8</button>
      <button onclick="add('9')">9</button>
      <button class="op" onclick="add('-')">−</button>

      <button onclick="add('4')">4</button>
      <button onclick="add('5')">5</button>
      <button onclick="add('6')">6</button>
      <button class="op" onclick="add('+')">+</button>

      <button onclick="add('1')">1</button>
      <button onclick="add('2')">2</button>
      <button onclick="add('3')">3</button>
      <button class="igual" onclick="calcular()">=</button>

      <button class="zero" onclick="add('0')">0</button>
      <button onclick="add('.')">.</button>
    </div>
  </div>

  <div class="historico-box">
    <h3>Histórico</h3>
    <ul id="historico"></ul>
    <button onclick="limparHistorico()">Limpar</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
